[alembic]
# Migration script location
script_location = migrations

# Migration file naming: <rev>_<slug>.py
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Path separator for sys.path inserts
path_separator = os

# sqlalchemy.url is read from the DATABASE_URL environment variable via env.py.
# Do NOT hardcode it here.

[post_write_hooks]
# Placeholder — can enable ruff/black formatting of generated migrations later.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
