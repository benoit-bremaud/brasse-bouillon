# ==============================================================================
# Brasse-Bouillon — Unified CI Pipeline
# Runs path-filtered jobs for mobile-app, api, website, and beer-encyclopedia
# on every PR to main.
#
# Quality gates (ADR-0019):
#   - Mobile App: lint + typecheck + format + unit tests (blocking coverage ratchet)
#   - API: lint + build + unit tests (blocking coverage ratchet) + e2e (Supertest)
#   - Website: ruff lint + format check + Python quality gate + unit tests
#   - Beer Encyclopedia: ruff lint + compile check + tests (blocking coverage ratchet)
#   - Security: npm audit (here) + gitleaks / CodeQL / dependency-review (dedicated workflows)
#
# The coverage floor is enforced by each package's own config (Jest
# coverageThreshold / coverage.py fail_under), so it gates locally and in CI;
# the floor sits a few points below the current baseline (raise, never lower).
# ==============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Detect which packages changed
  # ============================================================================
  changes:
    runs-on: ubuntu-latest
    # Observed max 0.21 min. Budgets across this file are deliberately loose:
    # the point is to turn a hung runner into a fast, legible failure instead
    # of letting it sit on the 360-minute Actions default, not to police
    # runtime. A job cancelled on a slow-runner day is noise that erodes trust
    # in CI, so every value keeps a wide margin over what we actually measure.
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      mobile-app: ${{ steps.filter.outputs.mobile-app }}
      api: ${{ steps.filter.outputs.api }}
      website: ${{ steps.filter.outputs.website }}
      beer-encyclopedia: ${{ steps.filter.outputs.beer-encyclopedia }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile-app:
              - 'packages/mobile-app/**'
            api:
              - 'packages/api/**'
            website:
              - 'packages/website/**'
            beer-encyclopedia:
              - 'packages/beer-encyclopedia/**'

  # ============================================================================
  # Mobile App: lint + typecheck + format + tests + coverage gate
  # ============================================================================
  mobile-app:
    needs: changes
    if: needs.changes.outputs.mobile-app == 'true'
    runs-on: ubuntu-latest
    # Observed max 2.29 min.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/mobile-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (npm workspaces — root lockfile)
        working-directory: .
        run: npm ci

      - name: Lint + Typecheck + Format check
        run: npm run ci:check

      - name: Run tests with coverage (blocking ratchet)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-app-coverage
          path: packages/mobile-app/coverage/lcov.info
          retention-days: 7

  # ============================================================================
  # API: lint + build + tests + coverage gate
  # ============================================================================
  api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    # Observed max 2.23 min.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (npm workspaces — root lockfile)
        working-directory: .
        run: npm ci

      - name: Lint check
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage (blocking ratchet)
        run: npm run test:cov

      - name: Run e2e tests (Supertest, in-memory SQLite + migrations)
        run: npm run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: packages/api/coverage/lcov.info
          retention-days: 7

  # ============================================================================
  # Website: ruff lint + format check + Python quality gate + unit tests
  # ============================================================================
  website:
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    # Observed max 0.18 min.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The package ships no pyproject.toml, so ruff runs on its built-in
      # defaults (line-length 88, lint rules E4/E7/E9/F) — deliberately looser
      # than the beer-encyclopedia ruleset, which this baseline does not meet.
      # Pinned exactly: Dependabot only tracks npm here, so an unpinned ruff
      # would drift silently and could redden an unrelated website PR when a
      # release changes formatter style or default rules. Nothing bumps this
      # pin automatically — next-review: 2027-01.
      - name: Install lint tooling (ruff)
        run: pip install ruff==0.15.8

      # Unguarded on purpose, unlike the two steps below: scripts/ and tests/
      # are always present here, and a guard would turn their disappearance
      # into a silent pass instead of the failure it should be.
      - name: Lint (ruff)
        run: ruff check scripts tests

      - name: Format check (ruff)
        run: ruff format --check scripts tests

      - name: Run quality gate
        run: |
          if [ -f scripts/quality_gate.py ]; then
            python3 scripts/quality_gate.py
          else
            echo "No quality gate script found — skipping"
          fi

      # The gate only checks structural invariants; the unit suites cover the
      # i18n generator and the gate logic itself (stdlib unittest — the suites
      # themselves pull no dependency; ruff above is the job's only install).
      - name: Run Python unit tests
        run: |
          if [ -d tests ]; then
            python3 -m unittest discover -s tests -v
          else
            echo "No tests directory — skipping"
          fi

  # ============================================================================
  # Beer Encyclopedia: ruff lint + compile check + tests + coverage
  # ============================================================================
  beer-encyclopedia:
    needs: changes
    if: needs.changes.outputs.beer-encyclopedia == 'true'
    runs-on: ubuntu-latest
    # Observed max 1.95 min — but budgeted higher than the npm jobs on purpose,
    # not aligned with them. This is the one job with no dependency cache:
    # `setup-python` here has no `cache: pip` (unlike `cache: npm` on mobile-app
    # and api), so `pip install -e ".[ml,dev]"` refetches ultralytics, easyocr
    # and opencv-python — and PyTorch transitively — from PyPI on every run.
    # That install step alone is the bulk of the job and swings widely on
    # registry conditions, so a slow PyPI day or a missing manylinux wheel
    # (forcing a source build) is a realistic way to overrun a tighter budget.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/beer-encyclopedia
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ml,dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Python compile sanity
        run: |
          python -m py_compile \
            api/main.py api/dependencies.py \
            api/routers/*.py api/schemas/*.py \
            ml/*.py db/*.py db/models/*.py scripts/*.py

      - name: Run tests with coverage (blocking ratchet via coverage.py fail_under)
        run: |
          pytest tests/ --cov=ml --cov=api --cov=db --cov-report=term --cov-report=lcov:coverage/lcov.info -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beer-encyclopedia-coverage
          path: packages/beer-encyclopedia/coverage/lcov.info
          retention-days: 7

  # ============================================================================
  # Security: dependency audit
  # ============================================================================
  security-audit:
    runs-on: ubuntu-latest
    # Observed max 0.40 min, but `npm audit` reaches the registry over the
    # network, which is the kind of step that hangs rather than fails — hence a
    # 25x margin rather than a tight one.
    #
    # Behaviour change worth naming: this job is deliberately unfailable today
    # (`npm audit ... || true` plus `continue-on-error: true`), so findings
    # never turn CI red. A `timeout-minutes` cancellation is NOT swallowed by
    # `continue-on-error`, so a registry hang can now fail this job for the
    # first time. That is the intended trade — a job stuck for six hours is
    # worse than an occasional red on a hung network call — but it is a real
    # change, not a no-op.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit Node dependencies
        run: npm audit --audit-level=high || true
        continue-on-error: true
