# SonarCloud / SonarQube project configuration — Brasse-Bouillon monorepo
# Targets: TypeScript packages (mobile-app + api)
#
# Default target: SonarCloud (https://sonarcloud.io). The CI workflow
# .github/workflows/sonarcloud.yml supplies SONAR_HOST_URL automatically
# via SonarSource/sonarcloud-github-action.
#
# Local usage against the Dockerized SonarQube Community Edition:
#   SONAR_HOST_URL=http://localhost:9000 make sonar-scan SONAR_TOKEN=sqp_xxxx
# Local usage against SonarCloud:
#   SONAR_HOST_URL=https://sonarcloud.io make sonar-scan SONAR_TOKEN=<sonarcloud-token>
#
# Authentication: SONAR_TOKEN env var — never hardcode tokens here.

sonar.projectKey=benoit-bremaud_brasse-bouillon
sonar.organization=benoit-bremaud
sonar.projectName=Brasse Bouillon
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# —— Sources ——————————————————————————————————————————————————————————————————
sonar.sources=\
  packages/api/src,\
  packages/mobile-app/src,\
  packages/mobile-app/app

# —— Tests ————————————————————————————————————————————————————————————————————
# backend: dedicated test/ directory + co-located *.spec.ts in src/
# frontend: co-located __tests__/ directories inside src/features/
sonar.tests=\
  packages/api/test,\
  packages/api/src,\
  packages/mobile-app/src

sonar.test.inclusions=\
  packages/api/test/**/*.e2e-spec.ts,\
  packages/api/src/**/*.spec.ts,\
  packages/mobile-app/src/**/__tests__/**/*.test.ts,\
  packages/mobile-app/src/**/__tests__/**/*.test.tsx

# —— Coverage (lcov) —————————————————————————————————————————————————————————
# Generated by: npm run test:coverage in each package
sonar.javascript.lcov.reportPaths=\
  packages/api/coverage/lcov.info,\
  packages/mobile-app/coverage/lcov.info

# —— TypeScript config ————————————————————————————————————————————————————————
sonar.typescript.tsconfigPaths=\
  packages/api/tsconfig.json,\
  packages/mobile-app/tsconfig.json

# —— Exclusions ———————————————————————————————————————————————————————————————
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.d.ts,\
  packages/mobile-app/ios/**,\
  packages/mobile-app/android/**,\
  packages/website/**,\
  packages/beer-encyclopedia/**,\
  _archive/**

# —— Coverage exclusions ——————————————————————————————————————————————————————
# Expo Router route files (thin wrappers delegating to feature screens)
sonar.coverage.exclusions=\
  packages/mobile-app/app/**,\
  packages/mobile-app/src/mocks/**,\
  packages/api/src/database/data-source.ts,\
  packages/api/src/database/migrations/**,\
  packages/api/src/main.ts

# —— Copy-Paste Detector (duplication) exclusions ———————————————————————————————
# The reference catalogues under packages/api/src/catalog/ are intentionally
# parallel by design — each catalogue (hop, fermentable, yeast, style, mash,
# water, equipment, misc) is a thin read-only wrapper around TypeORM with
# the same NestJS shape: module + controller + service + DTO. The structural
# similarity is the point (reviewers can scan one and immediately understand
# the others); refactoring it into a generic base class would obscure the
# per-catalogue field semantics that make the code grep-friendly.
#
# The seed files are also excluded because each catalogue entry must repeat
# the exact same 11-22 key sequence to typecheck — that intra-file repetition
# is the data shape, not duplicated logic.
#
# Tests stay in scope so genuine logic-duplication in spec setup IS still
# caught (the assertCommonCatalogueSeederBehaviours helper in
# seed-test-utils.ts already deduplicates the boilerplate that would
# otherwise be flagged).
#
# The mobile demo mocks under packages/mobile-app/src/mocks/ are also
# excluded for the same reason: catalogues of malts / hops / yeasts and
# the fil-rouge batch step arrays are intentionally parallel data
# definitions, not duplicated logic.
#
# bjcp-style-family.ts is the same case: its STYLE_DEFINITIONS array is one
# parallel data row per BJCP style (canonical + family + tiers + aliases),
# mirroring the encyclopedia seed — repeated shape, not duplicated logic.
sonar.cpd.exclusions=\
  packages/api/src/catalog/**/*.module.ts,\
  packages/api/src/catalog/**/services/*.service.ts,\
  packages/api/src/catalog/**/controllers/*.controller.ts,\
  packages/api/src/catalog/**/dtos/*.dto.ts,\
  packages/api/src/catalog/**/entities/*.orm.entity.ts,\
  packages/api/src/database/seeds/*-catalog.seed.ts,\
  packages/api/src/recipe/services/bjcp-style-family.ts,\
  packages/api/scripts/run-*-catalog-seed.ts,\
  packages/mobile-app/src/mocks/**

# —— Server URL ——————————————————————————————————————————————————————————————
# No sonar.host.url here. The URL is supplied by the environment:
#   - CI (GitHub Actions): set automatically by SonarSource/sonarcloud-github-action
#   - Local SonarQube (Docker): tools/ci/sonar-scan.sh defaults SONAR_HOST_URL to
#     http://localhost:9000 when the env var is unset.
#   - Local SonarCloud scan: export SONAR_HOST_URL=https://sonarcloud.io.
