name: Test
description: Write or improve tests (unit, integration, e2e).
title: "test(<scope>): <short description>"
labels: ["type:test"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package needs testing?
      options:
        - frontend
        - backend
        - website
    validations:
      required: true

  - type: dropdown
    id: test_type
    attributes:
      label: Test Type
      options:
        - Unit test (use-case, utility, service)
        - Integration test (screen, component, controller)
        - E2E test (full user flow)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What to Test
      description: Describe the feature, component, or use-case to test.
    validations:
      required: true

  - type: textarea
    id: test_cases
    attributes:
      label: Test Cases
      description: List the scenarios to cover.
      placeholder: |
        - [ ] Happy path: ...
        - [ ] Edge case: ...
        - [ ] Error case: ...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: When is this test task considered done?
      placeholder: |
        - [ ] All test cases implemented
        - [ ] Coverage increased for target module
        - [ ] CI passes

  - type: dropdown
    id: priority
    attributes:
      label: Priority (MoSCoW)
      options:
        - Must-Have
        - Should-Have
        - Nice-to-Have
    validations:
      required: true

  - type: dropdown
    id: estimation
    attributes:
      label: Estimation (T-shirt / Story Points)
      options:
        - XS (1 SP)
        - S (2 SP)
        - M (3 SP)
        - L (5 SP)
        - XL (8 SP)
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - Sprint 4 (Mar 25 – Apr 14)
        - Sprint 5 (Apr 15 – May 5)
        - Sprint 6 (May 6 – May 27)
        - Backlog (not yet planned)
    validations:
      required: true
