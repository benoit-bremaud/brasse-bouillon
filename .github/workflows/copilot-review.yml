name: Copilot Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  request_copilot_review:
    # Wait until the PR is ready for review.
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            // Idempotence: do not spam if we already asked.
            const existingComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );

            const alreadyAsked = existingComments.some((c) => {
              return (
                c.user?.login === "github-actions[bot]" &&
                typeof c.body === "string" &&
                c.body.includes("@copilot please review")
              );
            });

            if (alreadyAsked) {
              core.info("Copilot review already requested (comment exists).");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: "@copilot please review.",
            });

