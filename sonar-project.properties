# SonarQube project configuration — Brasse-Bouillon monorepo
# Targets: TypeScript packages (frontend + backend)
# SonarQube server: http://localhost:9000 (Community Edition, local Docker)
# Authentication: SONAR_TOKEN env var — never hardcode tokens here
#
# Usage: make sonar-scan SONAR_TOKEN=sqp_xxxx

sonar.projectKey=brasse-bouillon
sonar.projectName=Brasse Bouillon
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# —— Sources ——————————————————————————————————————————————————————————————————
sonar.sources=\
  packages/backend/src,\
  packages/frontend/src,\
  packages/frontend/app

# —— Tests ————————————————————————————————————————————————————————————————————
# backend: dedicated test/ directory + co-located *.spec.ts in src/
# frontend: co-located __tests__/ directories inside src/features/
sonar.tests=\
  packages/backend/test,\
  packages/backend/src,\
  packages/frontend/src

sonar.test.inclusions=\
  packages/backend/test/**/*.e2e-spec.ts,\
  packages/backend/src/**/*.spec.ts,\
  packages/frontend/src/**/__tests__/**/*.test.ts,\
  packages/frontend/src/**/__tests__/**/*.test.tsx

# —— Coverage (lcov) —————————————————————————————————————————————————————————
# Generated by: npm run test:coverage in each package
sonar.javascript.lcov.reportPaths=\
  packages/backend/coverage/lcov.info,\
  packages/frontend/coverage/lcov.info

# —— TypeScript config ————————————————————————————————————————————————————————
sonar.typescript.tsconfigPaths=\
  packages/backend/tsconfig.json,\
  packages/frontend/tsconfig.json

# —— Exclusions ———————————————————————————————————————————————————————————————
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.d.ts,\
  packages/frontend/ios/**,\
  packages/frontend/android/**,\
  packages/website/**,\
  _archive/**

# —— Coverage exclusions ——————————————————————————————————————————————————————
# Expo Router route files (thin wrappers delegating to feature screens)
sonar.coverage.exclusions=\
  packages/frontend/app/**,\
  packages/frontend/src/mocks/**,\
  packages/backend/src/database/data-source.ts,\
  packages/backend/src/main.ts

# —— SonarQube server ————————————————————————————————————————————————————————
# Override with SONAR_HOST_URL env var for non-local deployments.
sonar.host.url=http://localhost:9000
