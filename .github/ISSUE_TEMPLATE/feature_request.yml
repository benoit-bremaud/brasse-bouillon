name: Feature Request
description: Propose a new feature or enhancement (technical task, not a User Story).
title: "feat(<scope>): <short description>"
labels: ["type:feature"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this feature affect?
      options:
        - frontend
        - backend
        - website
        - monorepo (root config, CI, tooling)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what needs to be implemented and why.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What conditions must be met for this feature to be considered done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Implementation hints, affected files, related issues.

  - type: dropdown
    id: priority
    attributes:
      label: Priority (MoSCoW)
      options:
        - Must-Have
        - Should-Have
        - Nice-to-Have
    validations:
      required: true

  - type: dropdown
    id: estimation
    attributes:
      label: Estimation (T-shirt / Story Points)
      options:
        - XS (1 SP)
        - S (2 SP)
        - M (3 SP)
        - L (5 SP)
        - XL (8 SP)
        - "XXL (13 SP) — should be split"
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - Sprint 4 (Mar 25 – Apr 14)
        - Sprint 5 (Apr 15 – May 5)
        - Sprint 6 (May 6 – May 27)
        - Backlog (not yet planned)
    validations:
      required: true
