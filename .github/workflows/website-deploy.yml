name: Website Deploy

# Deploy the marketing site under `packages/website/` to Cloudflare Pages
# whenever website assets change on `main`, or manually via the Actions
# tab.
#
# History: the site previously shipped to GitHub Pages on the custom
# domain `brasse-bouillon.com`. When the repo turned private on a Free
# plan, GitHub Pages stopped serving (custom domain returned 404), so
# delivery moved to Cloudflare Pages (Direct Upload). This workflow
# stages only the public files (HTML / CSS / JS / images / sitemap /
# screenshots / seo) under `_site/` and uploads that directory to the
# `brasse-bouillon-website` Cloudflare Pages project via `wrangler`.
# Cloudflare credentials live in repo Actions secrets
# (CLOUDFLARE_API_TOKEN scoped to Pages:Edit, CLOUDFLARE_ACCOUNT_ID).

on:
  push:
    branches: [main, staging]
    paths:
      - "packages/website/**"
      - ".github/workflows/website-deploy.yml"
  workflow_dispatch:

# One in-flight deployment per branch: `main` (production) and `staging`
# (the long-lived staging environment, alias staging.brasse-bouillon-website.pages.dev)
# deploy independently and must not block each other.
concurrency:
  group: website-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Stage only the public-facing site under `_site/`. Everything that
      # ships to the browser is whitelisted here; internal repo files
      # (scripts/, tests/, CHANGELOG.md, CONTRIBUTING.md, README.md,
      # CLAUDE.md, package.json, sonar-project.properties, and the
      # internal portion of docs/ such as GOVERNANCE.md, SEO_RUNBOOK.md,
      # weekly/) stay out of the deployment.
      - name: Stage public site assets
        run: |
          set -euo pipefail
          # Empty globs become empty lists (instead of leaving the literal
          # in place), so `cp` is not called with a missing source if an
          # asset class disappears one day — Codex P2 on PR #1020.
          shopt -s nullglob

          mkdir -p _site
          src=packages/website

          # Glob copies — tolerate empty matches.
          for f in "$src"/*.html "$src"/*.css "$src"/*.js "$src"/*.png "$src"/*.svg "$src"/*.webp; do
            cp "$f" _site/
          done

          # Required scalar files — fail loudly if any go missing.
          # `_headers` and `_redirects` have no extension, so they are not
          # matched by the glob copies above and must be staged explicitly
          # (Cloudflare Pages reads them from the deployment root to set
          # response headers and URL redirects — ADR-0027 D2).
          for required in favicon.ico sitemap.xml robots.txt llms.txt _headers _redirects; do
            cp "$src/$required" _site/
          done

          # Optional public directories.
          if [ -d "$src/seo" ]; then
            cp -R "$src/seo" _site/seo
          fi
          if [ -d "$src/screenshots" ]; then
            cp -R "$src/screenshots" _site/screenshots
          fi
          # Self-hosted webfonts (.woff2). Not matched by the extension globs
          # above, so the fonts/ directory is staged explicitly — without it
          # /fonts/*.woff2 would 404 and pages fall back to system fonts.
          if [ -d "$src/fonts" ]; then
            cp -R "$src/fonts" _site/fonts
            # Provenance/licence note is repo-only — keep it out of the
            # deployed payload so /fonts/* is exclusively immutable .woff2.
            rm -f _site/fonts/_source.txt
          fi

          # ROADMAP.md was historically linked from the home pages; the pages
          # no longer link it, but the copy is kept so previously shared
          # /docs/ROADMAP.md URLs don't 404. Other docs/ contents
          # (GOVERNANCE.md, SEO_RUNBOOK.md, weekly/) stay internal.
          mkdir -p _site/docs
          cp "$src/docs/ROADMAP.md" _site/docs/ROADMAP.md

          echo "::group::Deployment payload"
          find _site -maxdepth 2 -type f | sort
          echo "::endgroup::"

      # Bootstrap the Pages project on first run, then deploy. The branch
      # passed to `pages deploy` is derived from the ref: pushes/dispatches
      # on `main` hit the production branch (`--production-branch=main`),
      # while a manual dispatch from any other branch produces a Cloudflare
      # *preview* deployment instead of overwriting production.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          project=brasse-bouillon-website

          # Create the project on first run. Tolerate ONLY the
          # "already exists" case — any other failure (auth, API outage,
          # quota) must fail the job rather than be silently swallowed.
          if ! out=$(npx --yes wrangler@3 pages project create "$project" --production-branch=main 2>&1); then
            echo "$out"
            if echo "$out" | grep -qiE 'already exists|exists with the name'; then
              echo "Project '$project' already exists — continuing."
            else
              echo "::error::Unexpected failure creating Pages project '$project'."
              exit 1
            fi
          fi

          npx --yes wrangler@3 pages deploy _site \
            --project-name="$project" \
            --branch="$GITHUB_REF_NAME"
