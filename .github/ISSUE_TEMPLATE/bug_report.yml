name: Bug Report
description: Report a bug or unexpected behavior.
title: "fix(<scope>): <short description>"
labels: ["type:bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - frontend
        - backend
        - website
        - monorepo (root config, CI, tooling)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
      placeholder: "What happened? What did you expect instead?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots or error logs if applicable.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic, workaround exists)
        - Medium (feature degraded but usable)
        - High (feature broken, no workaround)
        - Critical (app crash, data loss, security)
    validations:
      required: true
