- slug: ibu
  label: IBU
  aliases:
    - International Bitterness Units
  short_definition: Estimation de l'amertume utilisée dans les recettes de bière.
  detailed_definition: L'IBU estime la concentration de composés amers apportés principalement par le houblon après ébullition.
  related_terms:
    - acide-alpha
    - houblon
  source_ids:
    - palmer-2017

- slug: houblon
  label: Houblon
  aliases:
    - hops
  short_definition: Fleur utilisée en brassage pour apporter amertume, arômes et stabilité.
  detailed_definition: Le houblon apporte des composés amers, des huiles aromatiques et des polyphénols. Son effet dépend de la variété, de la quantité et du moment d'ajout.
  related_terms:
    - ibu
    - acide-alpha
  source_ids:
    - palmer-2017

- slug: acide-alpha
  label: Acide alpha
  aliases:
    - alpha acid
  short_definition: Composé du houblon qui contribue au potentiel d'amertume.
  detailed_definition: Les acides alpha sont des composés du houblon qui s'isomérisent pendant l'ébullition et participent à l'amertume.
  related_terms:
    - ibu
    - houblon
  source_ids:
    - palmer-2017

- slug: malt
  label: Malt
  aliases:
    - malted grain
  short_definition: Céréale germée puis séchée qui fournit amidon, enzymes, couleur et arômes.
  detailed_definition: Le malt est la base fermentescible de nombreuses bières. Pendant l'empâtage, ses enzymes transforment l'amidon en sucres utilisables par la levure.
  related_terms:
    - empatage
    - mout
    - ebc
  source_ids:
    - palmer-2017

- slug: mout
  label: Moût
  aliases:
    - wort
  short_definition: Liquide sucré obtenu après empâtage et filtration, avant fermentation.
  detailed_definition: Le moût contient les sucres, protéines, minéraux et composés aromatiques extraits des malts. Il devient bière après fermentation par la levure.
  related_terms:
    - malt
    - densite-initiale
    - fermentation
  source_ids:
    - palmer-2017

- slug: empatage
  label: Empâtage
  aliases:
    - mash
    - mashing
  short_definition: Étape où les grains concassés sont mélangés à l'eau chaude pour convertir l'amidon en sucres.
  detailed_definition: L'empâtage active les enzymes du malt dans une plage de température et de pH contrôlée. Il influence fermentescibilité, corps, rendement et profil final.
  related_terms:
    - malt
    - mout
    - ph
  source_ids:
    - palmer-2017

- slug: densite-initiale
  label: Densité initiale
  aliases:
    - OG
    - Original Gravity
  short_definition: Densité du moût avant fermentation.
  detailed_definition: La densité initiale estime la quantité de sucres disponibles avant fermentation. Elle sert à estimer le potentiel alcool et à comparer la recette au résultat attendu.
  related_terms:
    - mout
    - densite-finale
    - attenuation
  source_ids:
    - palmer-2017

- slug: densite-finale
  label: Densité finale
  aliases:
    - FG
    - Final Gravity
  short_definition: Densité mesurée lorsque la fermentation est terminée ou stabilisée.
  detailed_definition: La densité finale indique les sucres et composés restants après fermentation. Combinée à la densité initiale, elle permet d'estimer atténuation et alcool.
  related_terms:
    - densite-initiale
    - attenuation
    - fermentation
  source_ids:
    - palmer-2017

- slug: attenuation
  label: Atténuation
  aliases:
    - atténuation apparente
  short_definition: Baisse relative de densité entre le début et la fin de fermentation.
  detailed_definition: L'atténuation apparente estime la part des sucres consommée par la levure. Elle dépend de la souche, du moût, de l'empâtage et des conditions de fermentation.
  related_terms:
    - densite-initiale
    - densite-finale
    - fermentation
  source_ids:
    - palmer-2017

- slug: fermentation
  label: Fermentation
  aliases:
    - primary fermentation
  short_definition: Transformation des sucres du moût en alcool, CO2 et composés aromatiques par la levure.
  detailed_definition: La fermentation convertit les sucres fermentescibles et construit une grande partie du profil final. Température, levure, oxygène initial et nutriments influencent fortement le résultat.
  related_terms:
    - mout
    - attenuation
    - densite-finale
  source_ids:
    - palmer-2017

- slug: srm
  label: SRM
  aliases:
    - Standard Reference Method
  short_definition: Échelle américaine de mesure de la couleur de la bière.
  detailed_definition: Le SRM exprime la couleur finale de la bière selon une méthode standardisée. En brassage amateur, il est souvent estimé depuis la charge de malts avec des formules comme Morey.
  related_terms:
    - ebc
    - malt
  source_ids:
    - palmer-2017

- slug: ebc
  label: EBC
  aliases:
    - European Brewery Convention
  short_definition: Échelle européenne de mesure de la couleur de la bière et des malts.
  detailed_definition: L'EBC est utilisée en Europe pour exprimer la couleur. Pour la bière finale, une approximation courante est EBC environ égal à SRM multiplié par 1,97.
  related_terms:
    - srm
    - malt
  source_ids:
    - palmer-2017

- slug: profil-mineral
  label: Profil minéral
  aliases:
    - water profile
  short_definition: Composition minérale de l'eau de brassage.
  detailed_definition: Le profil minéral résume les ions principaux de l'eau, comme calcium, sulfates, chlorures, sodium, magnésium et bicarbonates.
  related_terms:
    - calcium
    - sulfate
    - chlorure
    - ph
  source_ids:
    - brun-water-knowledge

- slug: ph
  label: pH
  aliases:
    - potentiel hydrogène
  short_definition: Mesure de l'acidité ou de la basicité d'un liquide.
  detailed_definition: En brassage, le pH influence l'activité enzymatique, l'extraction, la fermentation et la stabilité sensorielle. Le pH d'empâtage est un repère important pour la précision du process.
  related_terms:
    - empatage
    - profil-mineral
    - calcium
  source_ids:
    - brun-water-knowledge

- slug: calcium
  label: Calcium
  aliases:
    - Ca
    - Ca2+
  short_definition: Ion majeur de l'eau de brassage qui aide le pH, la clarification et la fermentation.
  detailed_definition: Le calcium contribue à abaisser le pH d'empâtage, soutient certaines réactions enzymatiques et favorise la floculation. Il est souvent ajusté avec gypse ou chlorure de calcium.
  related_terms:
    - profil-mineral
    - sulfate
    - chlorure
    - ph
  source_ids:
    - brun-water-knowledge

- slug: sulfate
  label: Sulfate
  aliases:
    - SO4
    - SO4 2-
  short_definition: Ion de l'eau qui accentue souvent la sécheresse et la perception de l'amertume.
  detailed_definition: Les sulfates peuvent renforcer une impression plus sèche et plus nette, notamment dans les bières houblonnées. Leur effet doit être évalué avec les chlorures et les valeurs absolues.
  related_terms:
    - profil-mineral
    - calcium
    - chlorure
    - ibu
  source_ids:
    - brun-water-knowledge

- slug: chlorure
  label: Chlorure
  aliases:
    - chloride
    - Cl
  short_definition: Ion de l'eau qui soutient souvent la rondeur et l'expression maltée.
  detailed_definition: Les chlorures peuvent renforcer la perception de corps, de rondeur et de douceur maltée. Ils doivent rester équilibrés avec les sulfates et les concentrations totales.
  related_terms:
    - profil-mineral
    - calcium
    - sulfate
    - malt
  source_ids:
    - brun-water-knowledge

- slug: cervoise
  label: Cervoise
  aliases:
    - ale ancienne
  short_definition: Boisson fermentée à base de céréales, souvent citée pour les bières européennes non houblonnées ou peu houblonnées.
  detailed_definition: La cervoise désigne largement des boissons céréalières fermentées avant la domination du houblon comme marqueur de la bière européenne. Le terme aide à distinguer des pratiques anciennes de la bière moderne standardisée.
  related_terms:
    - gruit
    - houblon
    - fermentation
  source_ids:
    - hornsey-2003

- slug: gruit
  label: Gruit
  aliases:
    - grut
    - mélange d'herbes
  short_definition: Mélange de plantes aromatiques utilisé avant ou à côté du houblon pour parfumer et équilibrer certaines bières.
  detailed_definition: Le gruit regroupe des plantes dont la composition variait selon les régions, les droits de production et les usages locaux. Il rappelle que l'amertume et l'aromatique de la bière n'ont pas toujours été dominées par le houblon.
  related_terms:
    - cervoise
    - houblon
    - fermentation
  source_ids:
    - hornsey-2003

- slug: bappir
  label: Bappir
  aliases:
    - pain de bière
  short_definition: Préparation céréalière mésopotamienne associée aux descriptions anciennes du brassage.
  detailed_definition: Le bappir est souvent décrit comme un pain ou une préparation de céréales utilisée dans l'imaginaire et les reconstructions du brassage mésopotamien. Il sert de repère pour comprendre que les procédés anciens ne ressemblent pas toujours à l'empâtage moderne.
  related_terms:
    - malt
    - mout
    - fermentation
  source_ids:
    - etcsl-ninkasi
    - hornsey-2003

- slug: reinheitsgebot
  label: Reinheitsgebot
  aliases:
    - loi de pureté
    - règlement bavarois de 1516
  short_definition: Réglementation bavaroise de 1516 souvent associée à la composition de la bière.
  detailed_definition: Le Reinheitsgebot est fréquemment présenté comme une loi de pureté, mais il faut le replacer dans un contexte de prix, de céréales disponibles, de fiscalité et de contrôle du marché. Il ne doit pas être lu comme une recette universelle de la bière.
  related_terms:
    - malt
    - houblon
    - lager
  source_ids:
    - wired-reinheitsgebot-2010
    - hornsey-2003

- slug: lager
  label: Lager
  aliases:
    - bière de fermentation basse
  short_definition: Famille de bières associée à une fermentation plus froide et à une maturation prolongée.
  detailed_definition: Les lagers reposent sur une fermentation et une garde plus froides que les ales classiques. Leur essor historique est lié à la maîtrise de la levure, du froid, de la maturation et de la stabilité technique.
  related_terms:
    - fermentation
    - malt
    - reinheitsgebot
  source_ids:
    - hornsey-2003
    - bjcp-2021
