name: Copilot Review

# Copilot code review is MANUAL (on-demand), not automatic.
# Rationale: each Copilot review consumes a GitHub Copilot premium request
# (13 per review since 2026-06-01 under the AI-credits model), so we reserve it
# for deliberate, complementary reviews. The default review path is the local
# pre-push ritual (Claude + Codex) plus CodeRabbit post-push.
# See CONTRIBUTING.md § AI reviewers.
#
# To trigger Copilot on a PR: add the `needs-copilot` label.
on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  request_copilot_review:
    # Only when the `needs-copilot` label is applied, and only on non-draft PRs.
    if: ${{ github.event.label.name == 'needs-copilot' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const pull_number = issue_number;

            const prBody = context.payload.pull_request.body || "";

            // If the PR already mentions Copilot, don't add noise.
            if (prBody.toLowerCase().includes("@copilot")) {
              core.info("PR already mentions @copilot (body).");
              return;
            }

            // If Copilot already reviewed, do nothing.
            const existingReviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number, per_page: 100 },
            );

            const alreadyReviewed = existingReviews.some((r) => {
              return r.user?.login === "copilot-pull-request-reviewer";
            });

            if (alreadyReviewed) {
              core.info("Copilot already reviewed this PR.");
              return;
            }

            // Idempotence: do not spam if we already asked.
            const existingComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );

            const alreadyAsked = existingComments.some((c) => {
              return (
                typeof c.body === "string" &&
                c.body.toLowerCase().includes("@copilot please review")
              );
            });

            if (alreadyAsked) {
              core.info("Copilot review already requested (comment exists).");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: "@copilot please review.",
            });
