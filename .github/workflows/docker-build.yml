# ==============================================================================
# Docker — Build and publish the API image to GHCR
#
# On PR  : `build` job runs only (validates the Dockerfile, no push, no
#          packages: write permission).
# On main: `build` then `publish` runs — `publish` is the only job that holds
#          the packages: write permission, gated by `if: github.event_name ==
#          'push'`. This enforces least-privilege on PR builds.
#
# Tags produced on main:
#   ghcr.io/benoit-bremaud/brasse-bouillon-api:latest
#   ghcr.io/benoit-bremaud/brasse-bouillon-api:sha-<short-sha>
# ==============================================================================

name: Docker

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/api/**'
  push:
    branches: [main]
    paths:
      - 'packages/api/**'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

# Default token permissions for the workflow — read-only.
# The `publish` job overrides this to grant `packages: write`.
permissions:
  contents: read

jobs:
  build:
    name: Build (validate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish to GHCR
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/benoit-bremaud/brasse-bouillon-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
