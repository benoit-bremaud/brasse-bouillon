# SonarCloud / SonarQube — Brasse-Bouillon Backend
# https://sonarcloud.io/project/overview?id=benoit-bremaud_brasse-bouillon-backend

sonar.projectKey=benoit-bremaud_brasse-bouillon-backend
sonar.organization=benoit-bremaud
sonar.projectName=brasse-bouillon-backend
sonar.projectVersion=0.0.1

# Source & tests
sonar.sources=src
sonar.tests=src,test
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# Exclusions (generated, build, coverage, migrations are tracked but not analyzed)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.e2e-spec.ts,\
  **/migrations/**,\
  src/database/data-source.ts

# Coverage report (generated by jest --coverage with lcov reporter)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gate
# Fail CI if quality gate fails (handled by sonarqube-scan-action with sonar.qualitygate.wait=true)
