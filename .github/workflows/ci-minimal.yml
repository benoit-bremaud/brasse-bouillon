name: CI Minimal

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main, 'feat/**', 'fix/**', 'refactor/**', 'chore/**']

jobs:
  sanity-and-tests:
    name: Sanity and Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Python compile sanity
        run: |
          python -m py_compile api/main.py ml/*.py scripts/*.py

      - name: Run tests
        run: |
          pytest -q tests/test_recommender.py tests/test_dataset_sanity_check_behavior.py
