name: Task / Chore
description: Technical task, refactoring, documentation, or maintenance work.
title: "chore(<scope>): <short description>"
labels: ["type:chore"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this task affect?
      options:
        - frontend
        - backend
        - website
        - monorepo (root config, CI, tooling)
        - docs
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Task Type
      options:
        - Chore (config, tooling, dependencies)
        - Refactor (code improvement, no functional change)
        - Documentation
        - CI/CD
        - Testing
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Files to modify, dependencies, related issues.
