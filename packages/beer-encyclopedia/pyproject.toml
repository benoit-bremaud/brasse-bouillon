[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "beer-encyclopedia"
version = "0.2.3"
description = "Comprehensive beer encyclopedia with ML label scanning, brewery/beer database, and recipe recommendation"
requires-python = ">=3.12"
readme = "README.md"
license = { text = "UNLICENSED" }
authors = [
    { name = "Benoît Bremaud" },
]
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.0",
    "python-multipart>=0.0.9",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "python-slugify>=8.0",
    "python-dotenv>=1.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
ml = [
    "ultralytics",
    "easyocr",
    "opencv-python",
    "numpy",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "aiosqlite>=0.20",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["api*", "ml*", "db*", "importers*"]
exclude = ["tests*", "scripts*", "configs*", "data*", "docs*", "migrations*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
]
ignore = [
    "E501",   # line too long (handled by line-length)
    "B008",   # function call in default argument (FastAPI pattern: File(...))
    "TCH",    # type-checking block — imports are used at runtime
    "SIM103", # return condition directly — readability preference
]

[tool.ruff.lint.isort]
known-first-party = ["ml", "api", "db", "importers"]

[tool.ruff.format]
quote-style = "double"
