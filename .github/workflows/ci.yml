# ==============================================================================
# Brasse-Bouillon — Unified CI Pipeline
# Runs path-filtered jobs for mobile-app, api, website, and beer-label-ai
# on every PR to main.
#
# Quality gates:
#   - Mobile App: lint + typecheck + format + tests (70% coverage minimum)
#   - API: lint + build + tests (70% coverage minimum)
#   - Website: Python quality gate
#   - Beer Label AI: ruff lint + compile check + tests (70% coverage minimum)
#   - Security: npm audit for Node packages
# ==============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Detect which packages changed
  # ============================================================================
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      mobile-app: ${{ steps.filter.outputs.mobile-app }}
      api: ${{ steps.filter.outputs.api }}
      website: ${{ steps.filter.outputs.website }}
      beer-label-ai: ${{ steps.filter.outputs.beer-label-ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile-app:
              - 'packages/mobile-app/**'
            api:
              - 'packages/api/**'
            website:
              - 'packages/website/**'
            beer-label-ai:
              - 'packages/beer-label-ai/**'

  # ============================================================================
  # Mobile App: lint + typecheck + format + tests + coverage gate
  # ============================================================================
  mobile-app:
    needs: changes
    if: needs.changes.outputs.mobile-app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint + Typecheck + Format check
        run: npm run ci:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(npx lcov-summary coverage/lcov.info 2>/dev/null | grep -oP 'Lines:\s+\K[\d.]+' || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc -l 2>/dev/null || echo 1)" = "1" ]; then
            echo "::warning::Coverage is ${COVERAGE}% — below 70% threshold"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-app-coverage
          path: packages/mobile-app/coverage/lcov.info
          retention-days: 7

  # ============================================================================
  # API: lint + build + tests + coverage gate
  # ============================================================================
  api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(npx lcov-summary coverage/lcov.info 2>/dev/null | grep -oP 'Lines:\s+\K[\d.]+' || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc -l 2>/dev/null || echo 1)" = "1" ]; then
            echo "::warning::Coverage is ${COVERAGE}% — below 70% threshold"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: packages/api/coverage/lcov.info
          retention-days: 7

  # ============================================================================
  # Website: Python quality gate (if scripts exist)
  # ============================================================================
  website:
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run quality gate
        run: |
          if [ -f scripts/quality_gate.py ]; then
            python3 scripts/quality_gate.py
          else
            echo "No quality gate script found — skipping"
          fi

  # ============================================================================
  # Beer Label AI: ruff lint + compile check + tests + coverage
  # ============================================================================
  beer-label-ai:
    needs: changes
    if: needs.changes.outputs.beer-label-ai == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/beer-label-ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        run: ruff check .

      - name: Python compile sanity
        run: python -m py_compile api/main.py ml/*.py scripts/*.py

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=ml --cov=api --cov-report=term --cov-report=lcov:coverage/lcov.info -q

      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(python -c "
          import re, sys
          data = open('coverage/lcov.info').read()
          hits = sum(int(m) for m in re.findall(r'^DA:\d+,(\d+)', data, re.M))
          total = len(re.findall(r'^DA:\d+,', data, re.M))
          print(f'{100*hits/total:.1f}' if total else '0')
          " 2>/dev/null || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc -l 2>/dev/null || echo 1)" = "1" ]; then
            echo "::warning::Coverage is ${COVERAGE}% — below 70% threshold"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beer-label-ai-coverage
          path: packages/beer-label-ai/coverage/lcov.info
          retention-days: 7

  # ============================================================================
  # Security: dependency audit
  # ============================================================================
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit Node dependencies
        run: npm audit --audit-level=high || true
        continue-on-error: true
