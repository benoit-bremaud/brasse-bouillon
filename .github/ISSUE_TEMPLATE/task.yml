name: Task / Chore
description: Technical task, refactoring, documentation, or maintenance work.
title: "chore(<scope>): <short description>"
labels: ["type:chore"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this task affect?
      options:
        - frontend
        - backend
        - website
        - monorepo (root config, CI, tooling)
        - docs
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Task Type
      options:
        - Chore (config, tooling, dependencies)
        - Refactor (code improvement, no functional change)
        - Documentation
        - CI/CD
        - Testing
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Files to modify, dependencies, related issues.

  - type: dropdown
    id: priority
    attributes:
      label: Priority (MoSCoW)
      options:
        - Must-Have
        - Should-Have
        - Nice-to-Have
    validations:
      required: true

  - type: dropdown
    id: estimation
    attributes:
      label: Estimation (T-shirt / Story Points)
      options:
        - XS (1 SP)
        - S (2 SP)
        - M (3 SP)
        - L (5 SP)
        - XL (8 SP)
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - Sprint 4 (Mar 25 – Apr 14)
        - Sprint 5 (Apr 15 – May 5)
        - Sprint 6 (May 6 – May 27)
        - Backlog (not yet planned)
    validations:
      required: true
