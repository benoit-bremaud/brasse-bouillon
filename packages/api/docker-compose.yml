# ==============================================================================
# Brasse-Bouillon API — Docker Compose
#
# Local build:  docker compose up -d
# Server pull:  docker compose pull && docker compose up -d
#
# Before first run:
#   cp .env.docker.example .env
#   nano .env   # set JWT_SECRET (and optionally API_IMAGE_TAG)
#
# Image tag (API_IMAGE_TAG) defaults to `latest`. Pin to an immutable tag
# in production for reproducible deploys, e.g.:
#   API_IMAGE_TAG=sha-a1b2c3d docker compose pull && docker compose up -d
# ==============================================================================

services:
  api:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    image: ghcr.io/benoit-bremaud/brasse-bouillon-api:${API_IMAGE_TAG:-latest}
    container_name: brasse-bouillon-api
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    volumes:
      - api-data:/app/data
    restart: unless-stopped

volumes:
  api-data:
