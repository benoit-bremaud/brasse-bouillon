# ==============================================================
# SonarQube — brasse-bouillon-frontend
# Local analysis via Docker (see docs/SONARQUBE.md)
# ==============================================================

sonar.projectKey=brasse-bouillon-frontend
sonar.projectName=Brasse Bouillon Frontend
sonar.projectVersion=1.0.0

# Sources
sonar.sources=src,app
sonar.exclusions=**/node_modules/**,**/__tests__/**,**/mocks/**,**/*.d.ts

# Tests
sonar.tests=src
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.test.tsx

# Coverage — generated by: npm run test:coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
