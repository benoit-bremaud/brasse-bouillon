# ==============================================================================
# Docker — Build and publish the API image to GHCR
#
# On PR  : docker build only (validates the Dockerfile, no push)
# On main: docker build + push to ghcr.io/benoit-bremaud/brasse-bouillon-api
#
# Tags produced on main:
#   ghcr.io/benoit-bremaud/brasse-bouillon-api:latest
#   ghcr.io/benoit-bremaud/brasse-bouillon-api:sha-<short-sha>
# ==============================================================================

name: Docker

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/api/**'
  push:
    branches: [main]
    paths:
      - 'packages/api/**'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/benoit-bremaud/brasse-bouillon-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: packages/api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
